:root{

*{box-sizing:border-box}
body{margin:0;font-family:Montserrat,system-ui,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:15px}
header{background:var(--navy);color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{margin:0;font-size:19px;font-weight:700;letter-spacing:.3px}
header .gen{font-size:12px;opacity:.8}
.wrap{max-width:1280px;margin:0 auto;padding:18px}
.toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.toolbar .grp{display:flex;align-items:center;gap:8px}
.toolbar .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fff}
.seg button{border:0;background:#fff;padding:7px 13px;font:inherit;font-size:13px;cursor:pointer;color:var(--ink);border-right:1px solid var(--border)}

.seg button.active{background:var(--accent);color:#fff;font-weight:600}
.toolbar input[type=date],.toolbar select{font:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--border);border-radius:7px;background:#fff;color:var(--ink)}
.toolbar .range{margin-left:auto;font-size:12px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(580px,1fr));gap:16px}
.card{background:#fff;border:1px solid var(--border);border-left:6px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:0 2px 8px rgba(0,0,0,.05)}

.card.green{border-left-color:var(--green)} .card.na{border-left-color:var(--border)}
.chead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
.chead .name{font-weight:700;font-size:17px}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:7px;vertical-align:middle}
.dot.red{background:var(--red)} .dot.amber{background:var(--amber)} .dot.green{background:var(--green)} .dot.na{background:var(--border)}
.badge{font-size:11px;font-weight:600;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:2px 7px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
.kpi{background:var(--bg);border-radius:8px;padding:9px 10px}
.kpi .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.kpi .v{font-size:18px;font-weight:700;margin-top:2px}
.kpi .d{font-size:12px;font-weight:600;margin-top:1px}
.kpi .tgt{font-size:10px;color:var(--muted);margin-top:2px;font-weight:600}
.kpi .tgt b{font-weight:700}
.tgt .ok{color:var(--green)} .tgt .miss{color:var(--red)} .tgt .near{color:var(--amber)}
.up{color:var(--green)} .down{color:var(--red)} .flat{color:var(--muted)}
.chart{margin:10px 0 4px}
.chart .ctitle{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.chart .ctitle .legend{display:flex;gap:12px;text-transform:none;letter-spacing:0}
.chart .legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}
.chart svg{width:100%;height:auto;display:block}
.funnel{margin:14px 0 4px}
.funnel .ftitle{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.funnel .ftitle .hl{text-transform:none;letter-spacing:0;font-size:13px;color:var(--ink);font-weight:700}
.wf{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;align-items:end}
.wfcol{display:flex;flex-direction:column;justify-content:flex-end}
.wfcol .wfname{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wfcol .wfpct{font-size:15px;font-weight:700;line-height:1.1}
.wfcol .wfcount{font-size:11px;color:var(--muted)}
.wfcol .wftrend{font-size:11px;font-weight:600;margin-top:1px}
.wfcol .wfbar{margin-top:5px;background:linear-gradient(180deg,#9fd2ff,var(--accent));border-radius:3px 3px 0 0;min-height:3px}
.wfcol .wfbench{font-size:9px;margin-top:3px;font-weight:600}
.wfbench .b-ok{color:var(--green)} .wfbench .b-miss{color:var(--red)}
.extra{font-size:12px;color:var(--muted);margin-top:10px;display:flex;gap:14px;flex-wrap:wrap}
.insight{margin-top:12px;padding-top:11px;border-top:1px dashed var(--border)}
.insight .ins{font-size:13px;line-height:1.45}
.insight .act{font-size:13px;margin-top:7px;padding:7px 10px;background:#eef7ff;border-left:3px solid var(--accent);border-radius:0 6px 6px 0}
.pending{font-size:11px;color:var(--amber);font-weight:600;margin-top:6px}
footer{max-width:1280px;margin:6px auto 30px;padding:0 18px;font-size:11px;color:var(--muted);line-height:1.6}
@media(max-width:620px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

  const mr=targetRag(bl.mer,tg.mer), rr=targetRag(mt.roas,tg.roas);
  let rag=[mr,rr].filter(r=>r!=='na').sort((a,b)=>RANK[b]-RANK[a])[0]||'na';
  if(unprof && RANK[rag]<RANK.amber) rag='amber';
  return {rag,inactive,burning,unprof};
}
function attention(e,cur){
  const tg=e.targets||{}, bl=cur;
  let below=0;
  if(bl.mer!=null && tg.mer) below=Math.max(0,(tg.mer-bl.mer)/tg.mer);
  else if(!bl.ecomRev && bl.adSpend) below=1;
  return below*Math.log10(Math.max(bl.adSpend||0,10));
}

// ---- formatting ------------------------------------------------------------
const fmtMoney=(v,cur)=>v==null?'—':new Intl.NumberFormat('en-AU',{style:'currency',currency:cur,maximumFractionDigits:0}).format(v);
const fmtNum=(v,d=2)=>v==null?'—':Number(v).toFixed(d);
const fmtInt=v=>v==null?'—':Math.round(v).toLocaleString();
const pctChg=(c,p)=>(p==null||p===0||c==null)?null:(c-p)/p*100;

function deltaSpan(p,goodUp=true){
  if(p==null) return '<span class="d flat">—</span>';
  const good=goodUp?p>=0:p<=0, cls=Math.round(p)===0?'flat':(good?'up':'down');
  const arrow=Math.round(p)===0?'→':(p>0?'▲':'▼');
  return `<span class="d ${cls}">${arrow} ${Math.abs(p).toFixed(0)}%</span>`;
}
function tgtSpan(ratio,goodHigh=true){
  if(ratio==null) return '';
  const cls=goodHigh?(ratio>=1?'ok':(ratio>=0.7?'near':'miss')):(ratio<=1?'ok':(ratio<=1.3?'near':'miss'));
  return `<div class="tgt"><span class="${cls}">${(ratio*100).toFixed(0)}% of target</span></div>`;
}

// ---- dual-axis chart: revenue bars (right) + MER line (left) + target line --
function chart(e,cur){
  const d=e.daily||{}, m=d.meta||{}, ec=d.ecom||{}, g=d.google||{};
  const dates=(m.dates||ec.dates||[]); if(!dates.length) return '';
  const tg=(e.targets||{}).mer;
  const n=dates.length;
  // per-day series
  const rev=[], mer=[];
  for(let i=0;i<n;i++){
    const r=(ec.revenue&&ec.revenue[i])||0;
    const ad=((m.spend&&m.spend[i])||0)+((g.spend&&g.spend[i])||0);
    rev.push(r); mer.push(ad>0?r/ad:null);
  }
  const W=560,H=150,padL=38,padR=44,padT=12,padB=22;
  const iw=W-padL-padR, ih=H-padT-padB;
  const maxRev=Math.max(...rev,1)*1.12;
  const merVals=mer.filter(v=>v!=null);
  const maxMer=Math.max(...(merVals.length?merVals:[1]), tg||0)*1.15||1;
  const x=i=>padL+(n<=1?iw/2:i*iw/(n-1));
  const bw=Math.max(2,iw/n*0.6);
  const yRev=v=>padT+ih-(v/maxRev)*ih;
  const yMer=v=>padT+ih-(v/maxMer)*ih;
  // selected window shading
  const ri=rangeIdx(dates);
  let shade='';
  if(ri){const x0=x(ri.frI)-bw/2-1, x1=x(ri.toI)+bw/2+1;
    shade=`<rect x="${x0.toFixed(1)}" y="${padT}" width="${(x1-x0).toFixed(1)}" height="${ih}" fill="var(--accent)" opacity="0.06"/>`;}
  // bars
  let bars='';
  for(let i=0;i<n;i++){const h=Math.max(0,ih-(yRev(rev[i])-padT));
    bars+=`<rect x="${(x(i)-bw/2).toFixed(1)}" y="${yRev(rev[i]).toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" fill="#bfe0ff" rx="1"/>`;}
  // mer line (skip null gaps)
  let path='',started=false,dots='';
  for(let i=0;i<n;i++){if(mer[i]==null){started=false;continue;}
    path+=(started?'L':'M')+x(i).toFixed(1)+' '+yMer(mer[i]).toFixed(1)+' ';started=true;
    dots+=`<circle cx="${x(i).toFixed(1)}" cy="${yMer(mer[i]).toFixed(1)}" r="2" fill="var(--navy)"/>`;}
  // target line
  let tgt='';
  if(tg){const ty=yMer(tg).toFixed(1);
    tgt=`<line x1="${padL}" y1="${ty}" x2="${W-padR}" y2="${ty}" stroke="var(--green)" stroke-width="1.3" stroke-dasharray="5 3"/>
      <text x="${W-padR+2}" y="${(+ty+3)}" font-size="9" fill="var(--green)">tgt ${tg}</text>`;}
  // axes ticks
  const merTicks=[0,maxMer/2,maxMer].map(v=>`<text x="${padL-4}" y="${(yMer(v)+3).toFixed(1)}" font-size="9" fill="var(--muted)" text-anchor="end">${v.toFixed(1)}</text>`).join('');
  const revTicks=[0,maxRev/2,maxRev].map(v=>`<text x="${W-padR+3}" y="${(yRev(v)+3).toFixed(1)}" font-size="9" fill="#7badd6" text-anchor="start">${Math.round(v/1000)}k</text>`).join('');
  // hover columns (native title -> tooltip with numbers)
  let hov='';
  for(let i=0;i<n;i++){const cw=iw/n;
    const t=`${dates[i]}\nRevenue ${fmtMoney(rev[i],e.currency)}\nMER ${mer[i]==null?'—':mer[i].toFixed(2)}`;
    hov+=`<rect x="${(x(i)-cw/2).toFixed(1)}" y="${padT}" width="${cw.toFixed(1)}" height="${ih}" fill="transparent"><title>${t}</title></rect>`;}
  return `<div class="chart">
    <div class="ctitle"><span>Daily MER &amp; revenue · last ${n}d (selected window shaded)</span>
      <span class="legend"><span><i style="background:var(--navy)"></i>MER</span><span><i style="background:#bfe0ff"></i>Revenue</span></span></div>
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img">
      ${shade}${bars}<path d="${path}" fill="none" stroke="var(--navy)" stroke-width="1.8"/>${dots}${tgt}${merTicks}${revTicks}${hov}
    </svg></div>`;
}

// ---- funnel waterfall (Shopify-style, computed for selected window) ---------
const FSTAGES=[['clicks','Link Clicks',null],['lpv','Landing Page',['lpv_rate','clicks']],
  ['atc','Add to Cart',['atc_rate','lpv']],['ic','Checkout',['ic_rate','atc']],
  ['purchases','Purchase',null]];
function funnel(e,cur,prior){
  const m=cur.meta; if(m.clicks==null) return '';
  const top=m.clicks||0; if(!top) return '';
  const bench=e.funnel_benchmarks||{};
  const overall=m.purchases!=null&&top?m.purchases/top*100:null;
  const overallPrior=(prior&&prior.meta&&prior.meta.clicks)?(prior.meta.purchases/prior.meta.clicks*100):null;
  const oTrend=pctChg(overall,overallPrior);
  let cols='';
  for(const [key,name,bm] of FSTAGES){
    const cnt=m[key]||0, cumPct=top?cnt/top*100:0;
    const h=Math.max(3,Math.round(cumPct/100*70))+8;     // bar height px (taper)
    const pCnt=prior&&prior.meta?prior.meta[key]:null;
    const trend=pctChg(cnt,pCnt);
    let benchHtml='';
    if(bm){const [field,prevKey]=bm; const bv=bench[field];
      const prevCnt=m[prevKey]||0; const stepRate=prevCnt?cnt/prevCnt*100:null;
      if(bv!=null&&stepRate!=null){const ok=stepRate>=bv;
        benchHtml=`<div class="wfbench"><span class="${ok?'b-ok':'b-miss'}">${stepRate.toFixed(0)}% vs ${bv}%</span></div>`;}}
    const tr=trend==null?'<span class="flat">—</span>':`<span class="${trend>=0?'up':'down'}">${trend>=0?'▲':'▼'} ${Math.abs(trend).toFixed(0)}%</span>`;
    cols+=`<div class="wfcol">
      <div class="wfname" title="${name}">${name}</div>
      <div class="wfpct">${cumPct.toFixed(cumPct<10?2:1)}%</div>
      <div class="wfcount">${fmtInt(cnt)}</div>
      <div class="wftrend">${tr}</div>
      <div class="wfbar" style="height:${h}px"></div>
      ${benchHtml}
    </div>`;
  }
  const hl=overall==null?'':`${overall.toFixed(2)}% ${oTrend==null?'':(oTrend>=0?'<span class="up">▲ '+Math.abs(oTrend).toFixed(0)+'%</span>':'<span class="down">▼ '+Math.abs(oTrend).toFixed(0)+'%</span>')}`;
  return `<div class="funnel">
    <div class="ftitle"><span>Click → purchase funnel</span><span class="hl">${hl}</span></div>
    <div class="wf">${cols}</div></div>`;
}

// ---- card ------------------------------------------------------------------
function card(e){
  const d=e.daily||{}, dates=((d.meta||{}).dates||(d.ecom||{}).dates||[]);
  const ri=rangeIdx(dates);
  if(!ri) return `<div class="card na"><div class="chead"><div class="name">${e.label}</div></div><div class="sub">No daily data.</div></div>`;
  const cur=agg(e,ri.frI,ri.toI);
  const pri=priorIdx(dates,ri); const prior=pri?agg(e,pri.frI,pri.toI):null;
  const cur2={...cur, rag:null};
  const rg=ragOf(e,cur); cur._rag=rg.rag; cur._att=attention(e,cur); cur._flags=rg;
  const tg=e.targets||{}, cum=e.currency;

  const revD=prior?pctChg(cur.ecomRev,prior.ecomRev):null;
  const merD=prior?pctChg(cur.mer,prior.mer):null;
  const roasD=prior?pctChg(cur.meta.roas,prior.meta.roas):null;
  const cppD=prior?pctChg(cur.meta.cpp,prior.meta.cpp):null;
  const merR=(cur.mer!=null&&tg.mer)?cur.mer/tg.mer:null;
  const roasR=(cur.meta.roas!=null&&tg.roas)?cur.meta.roas/tg.roas:null;
  const cpaR=(cur.meta.cpp!=null&&tg.cpa)?cur.meta.cpp/tg.cpa:null;

  const ins=INSIGHTS[e.key]||{};
  const ss=e.source_status||{};
  const pend=Object.keys(ss).filter(k=>ss[k]!=='ok'&&ss[k]!=='disabled');

  const ex=[];
  if(cur.gSpend!=null) ex.push(`Google: spend ${fmtMoney(cur.gSpend,cum)} · ROAS ${fmtNum(cur.gSpend?cur.ecomRev/cur.gSpend:null)}`);
  // (email is window-precomputed only; show default-window figure if present)
  const dw=String(DATA.meta_info.default_window);
  const ew=(e.windows&&e.windows[dw]&&e.windows[dw].email)||null;
  if(ew&&ew.total_rev!=null) ex.push(`Email${e.key.startsWith('FLS')||e.key.startsWith('SM')?' (mkt)':''}: ${fmtMoney(ew.total_rev,cum)} (${ew.attributed_orders||0} ord, ${dw}d)`);

  return `<div class="card ${cur._rag}">
    <div class="chead">
      <div class="name"><span class="dot ${cur._rag}"></span>${e.label}</div>
      <span class="badge">${cum}</span>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="k">Revenue</div><div class="v">${fmtMoney(cur.ecomRev,cum)}</div>${deltaSpan(revD,true)}</div>
      <div class="kpi"><div class="k">MER</div><div class="v">${fmtNum(cur.mer)}</div>${deltaSpan(merD,true)}${tgtSpan(merR,true)}</div>
      <div class="kpi"><div class="k">Meta ROAS</div><div class="v">${fmtNum(cur.meta.roas)}</div>${deltaSpan(roasD,true)}${tgtSpan(roasR,true)}</div>
      <div class="kpi"><div class="k">Cost / Purch</div><div class="v">${fmtMoney(cur.meta.cpp,cum)}</div>${deltaSpan(cppD,false)}${tgtSpan(cpaR,false)}</div>
    </div>
    ${chart(e,cur)}
    ${funnel(e,cur,prior)}
    ${ex.length?`<div class="extra">${ex.map(x=>`<span>${x}</span>`).join('')}</div>`:''}
    <div class="insight">
      <div class="ins">${ins.insight||''}</div>
      ${ins.action?`<div class="act">→ ${ins.action}</div>`:''}
      ${pend.length?`<div class="pending">pending: ${pend.join(', ')}</div>`:''}
    </div>
  </div>`;
}

function render(){
  // compute attention per entity for current window, sort worst-first
  const ents=DATA.entities.map(e=>{
    const dates=((e.daily||{}).meta||{}).dates||((e.daily||{}).ecom||{}).dates||[];
    const ri=rangeIdx(dates); const cur=ri?agg(e,ri.frI,ri.toI):null;
    return {e, att:cur?attention(e,cur):0};
  }).sort((a,b)=>b.att-a.att);
  document.getElementById('grid').innerHTML=ents.map(o=>card(o.e)).join('');
  // range note
  const dates=AXIS; const ri=rangeIdx(dates);
  if(ri){const note=`Showing ${dates[ri.frI]} → ${dates[ri.toI]} (${ri.len}d)`+
    (state.cmp==='prev'?' vs previous '+ri.len+'d':' · no comparison')+' · sorted: needs attention first';
    document.getElementById('rangenote').textContent=note;}
}

function winButtons(){
  const names={1:'Yesterday',3:'3d',7:'7d',14:'14d',30:'30d'};
  const seg=document.getElementById('winseg');
  seg.innerHTML=DATA.meta_info.windows.map(n=>
    `<button data-w="${n}" class="${n===state.preset&&!state.from?'active':''}">${names[n]||n+'d'}</button>`).join('');
  seg.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    state.preset=Number(b.dataset.w); state.from=null; state.to=null;
    syncDateInputs(); seg.querySelectorAll('button').forEach(x=>x.classList.toggle('active',x===b)); render();
  });
}
function syncDateInputs(){
  const ri=rangeIdx(AXIS);
  if(ri){document.getElementById('dfrom').value=AXIS[ri.frI];document.getElementById('dto').value=AXIS[ri.toI];}
}
function wireControls(){
  const fEl=document.getElementById('dfrom'), tEl=document.getElementById('dto'), cEl=document.getElementById('cmp');
  fEl.min=tEl.min=AXIS[0]; fEl.max=tEl.max=AXIS[AXIS.length-1];
  fEl.onchange=()=>{state.from=fEl.value;state.to=tEl.value||AXIS[AXIS.length-1];clearActive();render();};
  tEl.onchange=()=>{state.to=tEl.value;state.from=fEl.value||AXIS[0];clearActive();render();};
  cEl.onchange=()=>{state.cmp=cEl.value;render();};
}
function clearActive(){document.querySelectorAll('#winseg button').forEach(b=>b.classList.remove('active'));}

function footer(){
  const mi=DATA.meta_info, notes=[];
  DATA.entities.forEach(e=>(e.notes||[]).forEach(n=>{if(n&&!notes.includes(n))notes.push(n);}));
  document.getElementById('footer').innerHTML=
    `Revenue = ecom net sales (source of truth); MER = ecom revenue ÷ (Meta+Google ad spend), recomputed live for any window. `+
    `Targets + funnel benchmarks from the Meta Auto Optimiser client config. RAG is vs target with absolute floors `+
    `(spend + zero sales = red; no spend & no sales = grey). Meta ROAS is platform-attributed. Currencies native per client, never summed.<br>`+
    (Object.keys(mi.source_status||{}).length?`Source status: ${JSON.stringify(mi.source_status)}<br>`:'')+
    (notes.length?`Notes: ${notes.join(' · ')}`:'');
}

winButtons(); wireControls(); syncDateInputs(); render(); footer();
</script>
