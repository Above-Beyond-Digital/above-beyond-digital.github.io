<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ABD Creative Insights</title>
<style>
:root{
  --black:#0A0A0A;--white:#fff;--gold:#C9A84C;--grey:#F4F4F4;
  --mid:#DEDEDE;--text:#1A1A1A;--accent:#0057FF;
  --badge-video:#1a3a6b;--badge-image:#1a472a;--badge-car:#4a1a6b;
  --badge-new:#0057FF;--badge-conflict:#b85c00;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--grey);color:var(--text);font-size:14px}

/* ── Password gate ── */
#gate{display:flex;align-items:center;justify-content:center;
  min-height:100vh;background:var(--black)}
.gate-box{text-align:center;padding:40px;background:var(--white);
  border-radius:8px;max-width:360px;width:100%}
.gate-box h2{margin-bottom:8px;font-size:22px;font-weight:700}
.gate-box p{color:#666;margin-bottom:24px;font-size:13px}
.gate-box input{width:100%;padding:12px;border:1px solid var(--mid);
  border-radius:4px;font-size:15px;margin-bottom:12px;outline:none}
.gate-box button{width:100%;padding:12px;background:var(--black);
  color:var(--white);border:none;border-radius:4px;font-size:15px;
  cursor:pointer;font-weight:600}
.gate-box button:hover{background:#333}
.gate-err{color:#c00;font-size:13px;margin-top:8px;display:none}
#report{display:none}

/* ── Report header ── */
.rpt-header{background:var(--black);color:var(--white);
  padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.rpt-header h1{font-size:18px;font-weight:700}
.rpt-meta{font-size:11px;color:#aaa;margin-top:3px}

/* ── Tab bar ── */
.tab-bar{background:var(--white);border-bottom:1px solid var(--mid);
  padding:0 32px;position:sticky;top:0;z-index:200;display:flex;gap:0}
.tab-btn{padding:14px 22px;font-size:13px;font-weight:600;cursor:pointer;
  border:none;background:none;color:#777;border-bottom:3px solid transparent;
  transition:color .15s,border-color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--black);border-bottom-color:var(--black)}

/* ── Controls bar ── */
.controls-bar{background:var(--white);border-bottom:1px solid var(--mid);
  padding:10px 32px;position:sticky;top:49px;z-index:100;
  display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.ctrl-group{display:flex;align-items:center;gap:6px}
.ctrl-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;
  letter-spacing:.05em;white-space:nowrap}
.btn-group{display:flex;gap:0}
.btn-group button{padding:5px 12px;font-size:12px;border:1px solid var(--mid);
  background:none;cursor:pointer;color:#555;transition:all .12s}
.btn-group button:first-child{border-radius:4px 0 0 4px}
.btn-group button:last-child{border-radius:0 4px 4px 0}
.btn-group button:not(:first-child){margin-left:-1px}
.btn-group button.active{background:var(--black);color:var(--white);
  border-color:var(--black);z-index:1}
.btn-group button:hover:not(.active){background:var(--grey)}
.ctrl-sep{width:1px;height:24px;background:var(--mid);margin:0 4px}
.count-label{font-size:11px;color:#999;margin-left:auto}

/* ── Tab content ── */
.tab-content{display:none}
.tab-content.active{display:block}
.brand-section{padding:20px 32px 0}
.country-header{font-size:13px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:#666;padding:16px 0 10px;
  border-bottom:1px solid var(--mid);margin-bottom:16px}

/* ── AI Insights panel ── */
.insights-panel{background:var(--white);border-radius:8px;margin-bottom:16px;
  border:1px solid var(--mid);overflow:hidden}
.insights-toggle{padding:12px 16px;cursor:pointer;display:flex;
  align-items:center;gap:8px;user-select:none;font-weight:600;font-size:13px}
.insights-toggle:hover{background:var(--grey)}
.insights-toggle .toggle-icon{margin-left:auto;font-size:11px;color:#999}
.insights-body{padding:16px;border-top:1px solid var(--mid);font-size:13px;line-height:1.7}
.insights-body ul{padding-left:18px}
.insights-body li{margin-bottom:6px}
.ai-badge{display:inline-block;font-size:10px;background:#f0f7ff;color:#0057FF;
  border:1px solid #cce0ff;border-radius:3px;padding:1px 5px;font-weight:600}
.placeholder-text{color:#bbb;font-style:italic}

/* ── Card grid ── */
.ads-grid{display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:14px;padding-bottom:32px}
.empty-state{padding:40px;text-align:center;color:#bbb;font-size:13px;
  background:var(--white);border-radius:8px;margin-bottom:16px}

/* ── Ad card ── */
.ad-card{border:1px solid var(--mid);border-radius:8px;overflow:hidden;
  background:var(--white);display:flex;flex-direction:column}
.ad-thumb{width:100%;aspect-ratio:1/1;background:var(--grey);overflow:hidden;
  display:flex;align-items:center;justify-content:center;position:relative;
  flex-shrink:0}
.ad-thumb img{width:100%;height:100%;object-fit:cover}
.no-thumb{color:#bbb;font-size:11px;text-align:center;padding:8px}
.ad-header{padding:8px 10px 6px;border-bottom:1px solid var(--mid)}
.ad-cr{font-weight:700;font-size:12px;color:var(--black)}
.ad-subtitle{font-size:10px;color:#666;margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ad-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.badge{display:inline-block;font-size:9px;font-weight:700;
  padding:2px 6px;border-radius:3px;color:var(--white);text-transform:uppercase;
  letter-spacing:.04em}
.badge-video{background:var(--badge-video)}
.badge-image{background:var(--badge-image)}
.badge-carousel{background:var(--badge-car)}
.badge-new{background:var(--badge-new)}
.badge-conflict{background:var(--badge-conflict)}
.ad-copy{padding:7px 10px;font-size:10px;color:#555;
  border-bottom:1px solid var(--mid);max-height:48px;overflow:hidden;
  line-height:1.4;background:#fafafa;flex-shrink:0}
.ad-link{display:block;padding:6px 10px;font-size:10px;color:var(--accent);
  text-decoration:none;border-bottom:1px solid var(--mid);
  font-weight:600;text-align:center}
.ad-link:hover{background:#f0f7ff}
.metrics{width:100%;border-collapse:collapse;margin-top:auto}
.metrics td{padding:4px 10px;font-size:11px;border-bottom:1px solid var(--grey)}
.metrics td:first-child{color:#777}
.metrics td:last-child{font-weight:600;text-align:right}
.metrics tr.hl td{background:#fffbf0}

footer{text-align:center;padding:24px;color:#bbb;font-size:11px}
</style>
</head>

async function sha(s){
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

};

/* ── Helpers ── */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getBucket(ad, w) {
  const raw = ad.metrics[w];
  if (!raw) return null;
  const stage = state.filter.stage;
  return stage === 'all' ? raw.all : (raw[stage] || raw.all);
}

function computeM(ad, w, sym) {
  const m = getBucket(ad, w);
  if (!m) return null;
  const sp=m.spend, rev=m.revenue, imp=m.impressions, clk=m.clicks;
  const ob=m.outbound||clk, pur=m.purchases, v3=m.video_3s;
  const fc = v => v>0 ? sym+v.toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—';
  const fp = v => v!==null&&v>0 ? v.toFixed(2)+'%' : '—';
  return {
    spend_raw:   sp,
    rev_raw:     rev,
    roas_raw:    sp>0 ? rev/sp : 0,
    ctr_raw:     imp>0 ? clk/imp*100 : 0,
    ts_raw:      (imp>0&&v3>0) ? v3/imp*100 : null,
    spend:       fc(sp),
    revenue:     fc(rev),
    roas:        sp>0 ? (rev/sp).toFixed(2)+'×' : '—',
    ctr_all:     fp(imp>0?clk/imp*100:0),
    ctr_link:    fp(imp>0?ob/imp*100:0),
    thumbstop:   (imp>0&&v3>0) ? (v3/imp*100).toFixed(1)+'%' : '—',
    cvr:         fp(ob>0?pur/ob*100:0),
    cpur:        pur>0 ? fc(sp/pur) : '—',
    aov:         pur>0 ? fc(rev/pur) : '—',
  };
}

function sortValue(ad, w) {
  const m = getBucket(ad, w);
  if (!m) return 0;
  switch(state.sort.key) {
    case 'roas':      return m.spend>0 ? m.revenue/m.spend : 0;
    case 'revenue':   return m.revenue||0;
    case 'spend':     return m.spend||0;
    case 'ctr':       return m.impressions>0 ? m.clicks/m.impressions : 0;
    case 'thumbstop': return (m.impressions>0&&m.video_3s>0) ? m.video_3s/m.impressions : 0;
    default: return 0;
  }
}

/* ── Render card ── */
function renderCard(ad, w, sym) {
  const m = computeM(ad, w, sym);
  if (!m) return '';
  const type_cls = {video:'badge-video',image:'badge-image',carousel:'badge-carousel'}[ad.type]||'';
  const type_lbl = {video:'VIDEO',image:'IMAGE',carousel:'CAROUSEL'}[ad.type]||ad.type?.toUpperCase()||'';
  let badges = '';
  if(type_lbl) badges += `<span class="badge ${type_cls}">${type_lbl}</span>`;
  if(ad.is_new) badges += `<span class="badge badge-new">NEW</span>`;
  if(ad.conflict) badges += `<span class="badge badge-conflict">⚠ ID conflict</span>`;

  const thumb = ad.thumbnail
    ? `<img src="${esc(ad.thumbnail)}" alt="" loading="lazy" onerror="this.style.display='none'">`
    : `<span class="no-thumb">No preview</span>`;

  const copy_html = ad.body ? `<div class="ad-copy">${esc(ad.body.substring(0,160))}</div>` : '';

  const mgr_url = `https://adsmanager.facebook.com/adsmanager/manage/ads?act=${esc(ad.account_id)}&selected_ad_ids=${esc(ad.rep_ad_id)}`;

  const ts_row = m.thumbstop !== '—' ? `<tr><td>Thumbstop</td><td>${m.thumbstop}</td></tr>` : '';

  return `
<div class="ad-card">
  <div class="ad-thumb">${thumb}</div>
  <div class="ad-header">
    <div class="ad-cr">${esc(ad.cr||ad.asset_key||'—')}</div>
    ${ad.cr_desc ? `<div class="ad-subtitle">${esc(ad.cr_desc)}</div>` : ''}
    <div class="ad-badges">${badges}</div>
  </div>
  ${copy_html}
  <a class="ad-link" href="${mgr_url}" target="_blank" rel="noopener">Ads Manager ↗</a>
  <table class="metrics">
    <tr><td>Ad Spend</td><td>${m.spend}</td></tr>
    <tr><td>Revenue</td><td>${m.revenue}</td></tr>
    <tr class="hl"><td>ROAS</td><td>${m.roas}</td></tr>
    <tr><td>CTR (all)</td><td>${m.ctr_all}</td></tr>
    <tr><td>CTR (link)</td><td>${m.ctr_link}</td></tr>
    ${ts_row}
    <tr><td>Conv. Rate</td><td>${m.cvr}</td></tr>
    <tr><td>cPUR</td><td>${m.cpur}</td></tr>
    <tr><td>AOV</td><td>${m.aov}</td></tr>
  </table>
</div>`;
}

/* ── Render grid for one brand ── */
function renderBrandGrid(brandName) {
  const brand = DATA.brands[brandName];
  const sym   = brand.sym;
  const w     = state.window;
  const stage = state.filter.stage;

  let ads = brand.ads.filter(ad => {
    const raw = ad.metrics[w];
    if (!raw) return false;
    // For stage filter: use that stage's bucket only (no fallback — 0 spend = exclude)
    const bucket = stage === 'all' ? raw.all : (raw[stage] || {spend:0});
    if ((bucket.spend||0) < 1.0) return false;
    if (state.filter.type !== 'all' && ad.type !== state.filter.type) return false;
    if (state.filter.cat === 'evergreen' && ad.is_sale) return false;
    if (state.filter.cat === 'sale' && !ad.is_sale) return false;
    if (state.filter.age === 'new' && !ad.is_new) return false;
    if (state.filter.age === 'old' && ad.is_new) return false;
    return true;
  });

  ads = [...ads].sort((a,b) => {
    const va = sortValue(a, w), vb = sortValue(b, w);
    return state.sort.dir === 'desc' ? vb - va : va - vb;
  });

  if (!ads.length) return `<div class="empty-state">No ads match the current filters.</div>`;
  return `<div class="ads-grid">${ads.map(a=>renderCard(a,w,sym)).join('')}</div>`;
}

/* ── Render insights panel ── */
function renderInsights(brandName) {
  const text = DATA.brands[brandName]&&DATA.brands[brandName].insights;
  if (!text) return '';
  const id = 'ins-' + brandName.replace(/\s+/g,'-').toLowerCase();
  const lines = text.split('\n');
  let html = '<ul>';
  let has_items = false;
  for (const line of lines) {
    const t = line.trim();
    if (t.startsWith('- ')||t.startsWith('• ')||t.startsWith('* ')) {
      html += `<li>${esc(t.slice(2))}</li>`;
      has_items = true;
    } else if (t && !has_items) {
      html += `<li>${esc(t)}</li>`;
    }
  }
  html += '</ul>';
  return `
<div class="insights-panel">
  <div class="insights-toggle" onclick="toggleEl('${id}',this)">
    <span>AI Insights &amp; Recommendations</span>
    <span class="ai-badge">AI</span>
    <span class="toggle-icon">▼</span>
  </div>
  <div class="insights-body" id="${id}" style="display:none">${html}</div>
</div>`;
}

function toggleEl(id, toggle) {
  const el = document.getElementById(id);
  const open = el.style.display === 'none';
  el.style.display = open ? 'block' : 'none';
  toggle.querySelector('.toggle-icon').textContent = open ? '▲' : '▼';
}

/* ── Render full tab ── */
function renderTab(tabId) {
  const tabConf = DATA.tabs.find(t=>t.id===tabId);
  if (!tabConf) return '';

  let html = '';
  for (const brandName of tabConf.brands) {
    const brand = DATA.brands[brandName];
    if (!brand) continue;
    const is_multi = tabConf.brands.length > 1;
    if (is_multi) html += `<div class="country-header">${esc(brandName)} &nbsp;<small style="font-weight:400;color:#aaa">${brand.sym}</small></div>`;
    html += renderInsights(brandName);
    html += renderBrandGrid(brandName);
  }
  return html;
}

/* ── Main render ── */
function render() {
  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === state.tab);
  });
  document.querySelectorAll('.tab-content').forEach(tc => {
    tc.classList.toggle('active', tc.dataset.tab === state.tab);
    if (tc.dataset.tab === state.tab) tc.innerHTML = renderTab(state.tab);
  });
  // Period
  document.querySelectorAll('[data-window]').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.window)===state.window));
  // Sort — toggle buttons, show active with arrow
  document.querySelectorAll('[data-sort]').forEach(b => {
    const k = b.dataset.sort;
    const isActive = state.sort.key === k;
    b.classList.toggle('active', isActive);
    b.textContent = isActive
      ? (SORT_LABELS[k]||k) + (state.sort.dir === 'desc' ? ' ↓' : ' ↑')
      : (SORT_LABELS[k]||k);
  });
  // Filters
  document.querySelectorAll('[data-ftype]').forEach(b  => b.classList.toggle('active', b.dataset.ftype  === state.filter.type));
  document.querySelectorAll('[data-fcat]').forEach(b   => b.classList.toggle('active', b.dataset.fcat   === state.filter.cat));
  document.querySelectorAll('[data-fstage]').forEach(b => b.classList.toggle('active', b.dataset.fstage === state.filter.stage));
  document.querySelectorAll('[data-fage]').forEach(b   => b.classList.toggle('active', b.dataset.fage   === state.filter.age));
}

/* ── Event wiring (deferred until DOM ready) ── */
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => { state.tab = btn.dataset.tab; render(); });
  });
  document.querySelectorAll('[data-window]').forEach(btn => {
    if (!MULTI_WINDOW && parseInt(btn.dataset.window) !== Math.max(...WINDOWS)) {
      btn.disabled = true; btn.title = 'Run without --single-window for multi-window data';
    }
    btn.addEventListener('click', () => { state.window = parseInt(btn.dataset.window); render(); });
  });
  // Sort: same button toggles direction; different button defaults to desc
  document.querySelectorAll('[data-sort]').forEach(btn => {
    btn.addEventListener('click', () => {
      const k = btn.dataset.sort;
      if (state.sort.key === k) {
        state.sort.dir = state.sort.dir === 'desc' ? 'asc' : 'desc';
      } else {
        state.sort = { key: k, dir: 'desc' };
      }
      render();
    });
  });
  document.querySelectorAll('[data-ftype]').forEach(btn => {
    btn.addEventListener('click', () => { state.filter.type = btn.dataset.ftype; render(); });
  });
  document.querySelectorAll('[data-fcat]').forEach(btn => {
    btn.addEventListener('click', () => { state.filter.cat = btn.dataset.fcat; render(); });
  });
  document.querySelectorAll('[data-fstage]').forEach(btn => {
    btn.addEventListener('click', () => { state.filter.stage = btn.dataset.fstage; render(); });
  });
  document.querySelectorAll('[data-fage]').forEach(btn => {
    btn.addEventListener('click', () => { state.filter.age = btn.dataset.fage; render(); });
  });
  render();
});
</script>
